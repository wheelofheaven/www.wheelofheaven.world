# mise.toml

min_version = "2025.8.3"

[tools]
zola = "0.21.0"
python = "3.12"
uv = "latest"
node = "22"

[env]
# add env vars here

[tasks.bundle]
description = "Bundle JS files with esbuild"
run = "cd themes/bifrost && npm install --silent && npm run bundle"

[tasks.sources]
description = "Rebuild data/sources.json from seed records + inline page references"
run = "python3 scripts/build_sources.py"

[tasks.build]
description = "Compile site statically with Zola"
depends = ["bundle"]
run = "zola build"

[tasks.purgecss]
description = "Remove unused CSS from built files"
depends = ["build"]
run = "cd themes/bifrost && npm run purgecss"

[tasks.build-prod]
description = "Production build with CSS purging"
run = "mise run build && mise run purgecss"

[tasks.serve]
description = "Run dev server (live reload, auto-selects free port)"
run = """
port=${ZOLA_PORT:-1111}
while lsof -Pi :$port -sTCP:LISTEN -t >/dev/null 2>&1; do port=$((port + 1)); done
echo "Serving on http://127.0.0.1:$port"
zola serve --port $port --interface 0.0.0.0 --base-url http://127.0.0.1
"""
raw = true

[tasks.check]
description = "Run diagnostics without writing files"
run = "zola check"

[tasks.clean]
description = "Wipe public directory"
run = "rm -rf public || true"
