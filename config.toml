landingS2Body = "Wheel of Heaven は作業仮説として次のように考える。すなわち、古い創造伝承の<em>エロヒム</em>とは、よそから来た小さな先進的な人間の文明であり、彼らはここに到来し、惑星を整え、地球上の生命を設計し、宗教的諸文献にその記録を残した、と。本サイトはその仮説を通してそれらの文献を読む。"
