tagline = "Douze âges, une hypothèse de travail."
elevatorPitch = "Wheel of Heaven est une lecture ouverte et multilingue des traditions de création du monde antique — raëliennes, bibliques, mésopotamiennes et autres — à travers une seule hypothèse de travail : que les êtres appelés Élohim étaient une petite civilisation humaine avancée venue d'ailleurs, qui est arrivée ici, a conçu la vie sur Terre et a laissé un récit dans les textes religieux. La lecture se déploie sur douze âges du cycle de la précession, depuis le début du projet il y a vingt-deux mille ans jusqu'à l'âge actuel de la révélation et dans le long avenir qu'ouvre la prochaine Grande Année. Le site est libre, attentif à ses sources, et conçu pour que le travail puisse être vérifié."
