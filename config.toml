[languages.ko.translations]
tagline = "열두 시대, 하나의 작업 가설."
elevatorPitch = "Wheel of Heaven은 고대 세계의 창조 전승 — 라엘리안, 성경, 메소포타미아, 그 외 — 을 하나의 작업 가설을 통해 읽어내는 열린 다국어 읽기입니다. 그 가설이란, 엘로힘이라 불리는 존재가 다른 곳에서 온 작은 선진 인류 문명이었으며, 그들이 이곳에 와서 지구상의 생명을 설계하고 종교 문헌에 그 기록을 남겼다는 것입니다. 이 읽기는 세차 주기의 열두 시대에 걸쳐 펼쳐집니다. 이만 이천 년 전 프로젝트의 시작에서, 현재의 드러남의 시대를 지나, 다음 대년(大年)이 여는 긴 미래까지 이어집니다. 이 사이트는 오픈소스이며 출처에 충실하고, 작업이 검증될 수 있도록 만들어졌습니다."
