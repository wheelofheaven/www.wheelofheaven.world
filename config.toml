landingS5Eyebrow = "현재의 시대"
landingS5Heading = "당신은 열두 번째 시대 안에 있다."
landingS5Body = "물병자리 시대는 이십 세기 중반에 열렸다. 본 코퍼스의 읽기에서, 이는 담겼던 것이 부어지는 시대이다 &mdash; 프로젝트의 긴 기억이 읽힐 수 있게 되는 시대, 인류가 자신의 기원을 과학적으로 평가할 수 있게 되는 시대이다. 드러남은 진행 중이다."
landingS6Eyebrow = "방법"
landingS6Heading = "신조가 아닌, 작업 가설."
landingS6Body = "이 읽기는 옹호되어야 할 교리가 아니라 시험되어야 할 가설이다. 본 코퍼스는 출처에 가까이 다가가 읽는다 &mdash; 라엘리안, 성경, 메소포타미아, 베다, 그 외 &mdash; 번역을 명시하고, 평행을 표시하며, 차이를 보존한다. 모든 페이지는 그 주요 주장을 직접적, 추론적, 사변적 가운데 하나로 표시한다. 증거가 움직이면, 읽기도 움직인다."
