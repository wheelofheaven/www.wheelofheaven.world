landingS5Body = "La Era de Acuario se abrió a mediados del siglo veinte. Según la lectura del corpus, esta es la era en la que se derrama lo que había sido contenido &mdash; la era en la que la larga memoria del proyecto se vuelve legible, la era en la que la humanidad se vuelve científicamente capaz de evaluar su propio origen. La revelación está en marcha."
landingS6Eyebrow = "El método"
landingS6Heading = "Una hipótesis de trabajo, no un credo."
landingS6Body = "La lectura es una hipótesis para ser puesta a prueba, no una doctrina para ser defendida. El corpus lee cerca de sus fuentes &mdash; raelianas, bíblicas, mesopotámicas, védicas y otras &mdash; con traducciones nombradas, paralelos señalados y diferencias preservadas. Cada página marca su afirmación principal como directa, inferida o especulativa. Donde la evidencia cambia, la lectura cambia."
