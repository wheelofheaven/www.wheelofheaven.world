landingNav8 = "Koda"
landingS1Heading = "Was, wenn die Götter der Genesis eine Zivilisation waren?"
landingS1SubLead = "das Wort der Hebräischen Bibel für die Wesen, die die Menschheit erschufen"
landingS1SubTrail = "ist ein Substantiv im Plural."
landingHintReadOn = "Weiterlesen"
timelineOverviewEyebrow = "Zwölf präzessionelle Zeitalter"
timelineReadAge = "Dieses Zeitalter lesen"
timelineYearLabel = "Jahr"
landingHintContinue = "Weiter"
landingS2Eyebrow = "Die Hypothese"
landingS2Heading = "Eine fortgeschrittene menschliche Zivilisation, kein Gott."
landingS2Body = "Wheel of Heaven vertritt, als Arbeitshypothese, dass die <em>Elohim</em> der älteren Schöpfungsüberlieferungen eine kleine, fortgeschrittene menschliche Zivilisation von anderswo waren &mdash; dass sie hierher kamen, den Planeten vorbereiteten, das Leben auf der Erde gestalteten und einen Bericht in den religiösen Texten hinterließen. Die Seite liest jene Texte durch diese Hypothese."
landingS3Eyebrow = "Der Umfang"
landingS3Heading = "Ein Projekt von zweiundzwanzigtausend Jahren."
landingS3Body = "Nach der Lesart von Wheel of Heaven begann die Arbeit zu Beginn des Steinbockzeitalters, um 19.800 v. u. Z., als eine kleine Expedition auf einer kahlen Erde eintraf und die lange Vorbereitung begann. Seither sind zwölf Präzessionszeitalter vergangen. Wir befinden uns im zwölften."
landingArcCapricorn = "Steinbock"
landingArcLeo = "Löwe"
landingArcAquarius = "Wassermann"
landingArcToday = "heute"
landingS4Eyebrow = "Die kosmische Uhr"
landingS4Heading = "Zwölf Zeitalter. Sechsundzwanzigtausend Jahre. Ein Bogen."
landingS4Body = "Die Achse der Erde zeichnet einen langsamen Kreis am Himmel und vollendet einen ganzen Zyklus alle 25.920 Jahre &mdash; die Präzession der Tagundnachtgleichen. Geteilt durch die zwölf Sternbilder des Tierkreises ergibt dieser Zyklus Zeitalter von etwa 2.160 Jahren. Die antiken Astronomen bewahrten diese Uhr in ihren Monumenten und Mythen. Das Korpus liest die Schöpfungsüberlieferungen über seine zwölf Zeitalter hinweg."
landingDialAria = "Die zwölf Präzessionszeitalter"
landingDialToday = "heute"
landingDialOpposite = "vor ~13.000 Jahren"
landingDialCenter = "25.920<br>Jahre"
landingS5Eyebrow = "Das gegenwärtige Zeitalter"
landingS5Heading = "Sie befinden sich im zwölften Zeitalter."
landingS5Body = "Das Wassermannzeitalter begann in der Mitte des zwanzigsten Jahrhunderts. Nach der Lesart des Korpus ist dies das Zeitalter, in dem ausgegossen wird, was eingeschlossen war &mdash; das Zeitalter, in dem die lange Erinnerung an das Projekt lesbar wird, das Zeitalter, in dem die Menschheit wissenschaftlich fähig wird, ihren eigenen Ursprung zu beurteilen. Die Offenbarung ist im Gange."
landingS6Eyebrow = "Die Methode"
landingS6Heading = "Eine Arbeitshypothese, kein Glaubensbekenntnis."
landingS6Body = "Die Lesart ist eine Hypothese, die zu prüfen, kein Lehrsatz, der zu verteidigen ist. Das Korpus liest nahe an seinen Quellen &mdash; raëlianisch, biblisch, mesopotamisch, vedisch und andere &mdash; mit benannten Übersetzungen, gekennzeichneten Parallelen und gewahrten Unterschieden. Jede Seite kennzeichnet ihre Hauptaussage als direkt, abgeleitet oder spekulativ. Wo sich die Belege verschieben, verschiebt sich die Lesart."
landingMethodKeyAria = "Schlüssel der Aussagetypen"
landingBadgeDirectChar = "D"
landingBadgeDirectRest = "irekt"
landingBadgeDirectNote = "explizit in einer Primärquelle"
landingBadgeInferredChar = "A"
landingBadgeInferredRest = "bgeleitet"
landingBadgeInferredNote = "eine plausible Lesart einer Quelle"
landingBadgeSpeculativeChar = "S"
landingBadgeSpeculativeRest = "pekulativ"
landingBadgeSpeculativeNote = "interpretative Synthese oder Hypothese"
landingS7Eyebrow = "Lesewege"
landingS7Heading = "Drei Zugänge."
landingPathTimelineTitle = "Die Zeitleiste"
landingPathTimelineDesc = "Sechsundzwanzigtausend Jahre, durch zwölf Zeitalter beschritten, von der ersten Ankunft im Steinbock bis zum heutigen Wassermann."
landingPathTimelineCta = "Die Zeitalter durchschreiten"
landingPathLibraryTitle = "Die Bibliothek"
landingPathLibraryDesc = "Die Primärtexte, aus denen das Korpus liest, mit Kommentar und Kontext."
landingPathLibraryCta = "Bibliothek öffnen"
landingPathWikiTitle = "Das Wiki"
landingPathWikiDesc = "Nachschlageeinträge zu Elohim, Präzession, den Figuren der Schöpfungsüberlieferungen und der Terminologie des Projekts selbst."
landingPathWikiCta = "Einträge durchstöbern"
landingHintCoda = "Oder mit den Worten des Projekts selbst abschließen"
landingCodaQuote = "Das Zeitalter trägt den Namen seines Sternbilds: Wassermann, der Wasserträger. Das Korpus liest es in seinem buchstäblichsten Sinn: Das Wassermannzeitalter ist das Zeitalter, in dem ausgegossen wird, was eingeschlossen war."
landingCodaCite = "Wheel of Heaven, Wassermannzeitalter"
landingCodaDesc = "Wheel of Heaven ist quelloffen, mehrsprachig und frei. Der Text ist öffentlich. Die Lesart ist Ihnen überlassen, sie zu beurteilen."
