landingS3Body = "Wheel of Heaven の読みでは、その営みは紀元前一万九千八百年ごろ、山羊座時代の始まりに始まった。小さな一団が荒涼とした地球に到来し、長い準備に取りかかったのである。それ以来、十二の歳差時代が展開してきた。私たちは十二番目の中にいる。"
