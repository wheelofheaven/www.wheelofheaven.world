landingS6Eyebrow = "Метод"
landingS6Heading = "Рабочая гипотеза, а не догма."
landingS6Body = "Это прочтение &mdash; гипотеза, которую следует проверять, а не доктрина, которую следует защищать. Корпус читает близко к своим источникам &mdash; раэлианским, библейским, месопотамским, ведическим и иным &mdash; с обозначенными переводами, помеченными параллелями и сохранёнными различиями. Каждая страница помечает своё основное утверждение как прямое, выводное или умозрительное. Там, где сдвигаются свидетельства, сдвигается прочтение."
