[languages.de.translations]
tagline = "Zwölf Zeitalter, eine Arbeitshypothese."
elevatorPitch = "Wheel of Heaven ist eine offene, mehrsprachige Lesart der Schöpfungsüberlieferungen der Antike — raëlianisch, biblisch, mesopotamisch und andere — durch eine einzige Arbeitshypothese: dass die als Elohim bezeichneten Wesen eine kleine, fortgeschrittene menschliche Zivilisation von anderswo waren, die hierher kam, das Leben auf der Erde gestaltete und einen Bericht in den religiösen Texten hinterließ. Die Lesart spannt sich über zwölf Zeitalter des Präzessionszyklus, vom Beginn des Projekts vor zweiundzwanzigtausend Jahren bis ins gegenwärtige Zeitalter der Offenbarung und in die lange Zukunft hinein, die das nächste Große Jahr eröffnet. Die Seite ist frei, quellenbewusst und so gebaut, dass die Arbeit überprüft werden kann."
