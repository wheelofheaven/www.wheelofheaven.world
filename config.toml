landingDialOpposite = "約 13,000 年前"
landingDialCenter = "25,920<br>年"
landingS5Eyebrow = "當今時代"
landingS5Heading = "你正身處第十二個時代之中。"
landingS5Body = "水瓶座時代於二十世紀中葉開啟。在本語料庫的閱讀中，這是被收容之物得以傾倒的時代 &mdash; 是這項工程的悠長記憶變得可讀的時代，是人類在科學上有能力評估自身起源的時代。揭示正在進行。"
landingS6Eyebrow = "方法"
landingS6Heading = "一份工作假設，而非教義。"
landingS6Body = "這一閱讀是有待檢驗的假設，而非有待捍衛的教條。本語料庫貼近其來源 &mdash; 雷利安、聖經、美索不達米亞、吠陀及其他 &mdash; 明示譯本、標註平行、保存差異。每一頁都將其主要主張標註為「直接」、「推論」或「臆測」。證據變化時，閱讀隨之變化。"
