landingS2Body = "Wheel of Heaven은 작업 가설로서 다음과 같이 본다 &mdash; 더 오래된 창조 전승의 <em>엘로힘</em>은 다른 곳에서 온 작은 선진 인류 문명이었으며, 그들이 이곳에 와서 행성을 다듬고, 지구상의 생명을 설계하고, 종교 문헌에 그 기록을 남겼다는 것이다. 본 사이트는 그 가설을 통해 이 문헌들을 읽는다."
landingS3Eyebrow = "범위"
landingS3Heading = "이만 이천 년에 걸친 프로젝트."
landingS3Body = "Wheel of Heaven의 읽기에 따르면, 이 작업은 약 기원전 19,800년경, 염소자리 시대의 시작에 시작되었다 &mdash; 작은 원정대가 헐벗은 지구에 도착하여 긴 준비를 시작한 것이다. 그 이후로 열두 세차 시대가 펼쳐졌다. 우리는 그 열두 번째 안에 있다."
