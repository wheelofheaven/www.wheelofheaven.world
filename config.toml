landingS4Heading = "열두 시대. 이만 육천 년. 하나의 호."
landingS4Body = "지구의 자전축은 하늘에 천천히 원을 그리며, 25,920년마다 한 번의 완전한 주기를 마친다 &mdash; 분점의 세차이다. 황도 십이성좌로 나누면, 이 주기는 약 2,160년씩의 시대를 만들어낸다. 고대의 천문학자들은 이 시계를 그들의 기념물과 신화 속에 보존했다. 본 코퍼스는 그 열두 시대를 가로질러 창조 전승을 읽는다."
