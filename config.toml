landingBadgeSpeculativeNote = "síntesis interpretativa o hipótesis"
landingS7Eyebrow = "Vías de lectura"
landingS7Heading = "Tres formas de entrar."
landingPathTimelineTitle = "La Cronología"
landingPathTimelineDesc = "Veintiséis mil años recorridos a través de doce eras, desde la primera llegada en Capricornio hasta el Acuario actual."
