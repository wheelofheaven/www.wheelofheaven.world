landingS2Eyebrow = "假设"
landingS2Heading = "并非神，而是一支先进的人类文明。"
landingS2Body = "Wheel of Heaven 持有以下工作假设：在更古老的创世传统中，<em>Elohim</em> 是一支来自他处的小型先进人类文明 &mdash; 他们来到这里，整备了这颗行星，设计了地球上的生命，并在宗教文本中留下了记录。本站透过这一假设阅读这些文本。"
landingS3Eyebrow = "范围"
landingS3Heading = "一项历经两万两千年的工程。"
landingS3Body = "依照 Wheel of Heaven 的阅读，这项工作始于摩羯座时代之初，约公元前 19,800 年 &mdash; 一支小型探索队抵达一片荒芜的地球，开始了漫长的准备。此后已展开了十二个岁差时代。我们正身处第十二个之中。"
landingArcCapricorn = "摩羯座"
landingArcLeo = "狮子座"
landingArcAquarius = "水瓶座"
landingArcToday = "今天"
landingS4Eyebrow = "宇宙之钟"
landingS4Heading = "十二个时代。两万六千年。一个弧。"
landingS4Body = "地球的自转轴在天空中缓慢画出一个圆，每 25,920 年完成一次完整循环 &mdash; 这便是分点岁差。以黄道十二星座加以划分，这一周期产生约每 2,160 年一个的时代。古代天文学家将这座时钟保留在他们的纪念碑与神话之中。本语料库以其十二个时代为背景阅读各创世传统。"
landingDialAria = "十二个岁差时代"
landingDialToday = "今天"
landingDialOpposite = "约 13,000 年前"
landingDialCenter = "25,920<br>年"
landingS5Eyebrow = "当今时代"
landingS5Heading = "你正身处第十二个时代之中。"
landingS5Body = "水瓶座时代于二十世纪中叶开启。在本语料库的阅读中，这是被收容之物得以倾倒的时代 &mdash; 是这项工程的悠长记忆变得可读的时代，是人类在科学上有能力评估自身起源的时代。揭示正在进行。"
landingS6Eyebrow = "方法"
landingS6Heading = "一份工作假设，而非教义。"
landingS6Body = "这一阅读是有待检验的假设，而非有待捍卫的教条。本语料库贴近其来源 &mdash; 雷利安、圣经、美索不达米亚、吠陀及其他 &mdash; 明示译本、标注平行、保存差异。每一页都将其主要主张标注为「直接」、「推论」或「臆测」。证据变化时，阅读随之变化。"
