landingS2Body = "Wheel of Heaven утверждает в качестве рабочей гипотезы, что <em>Элохим</em> древнейших преданий о сотворении были небольшой развитой человеческой цивилизацией извне &mdash; что они прибыли сюда, подготовили планету, спроектировали жизнь на Земле и оставили запись в религиозных текстах. Сайт читает эти тексты через призму этой гипотезы."
landingS3Eyebrow = "Масштаб"
landingS3Heading = "Проект, длящийся двадцать две тысячи лет."
landingS3Body = "Согласно прочтению Wheel of Heaven, работа началась в начале эпохи Козерога, около 19 800 года до н. э., когда небольшая экспедиция прибыла на голую Землю и начала долгую подготовку. С тех пор развернулись двенадцать прецессионных эпох. Мы находимся внутри двенадцатой."
