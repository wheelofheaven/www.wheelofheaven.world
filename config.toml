landingS4Eyebrow = "宇宙之鐘"
landingS4Heading = "十二個時代。兩萬六千年。一個弧。"
landingS4Body = "地球的自轉軸在天空中緩慢畫出一個圓，每 25,920 年完成一次完整循環 &mdash; 這便是分點歲差。以黃道十二星座加以劃分，這一週期產生約每 2,160 年一個的時代。古代天文學家將這座時鐘保留在他們的紀念碑與神話之中。本語料庫以其十二個時代為背景閱讀各創世傳統。"
