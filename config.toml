landingS5Body = "水瓶座時代於二十世紀中葉開啟。在本語料庫的閱讀中，這是被收容之物得以傾倒的時代 &mdash; 是這項工程的悠長記憶變得可讀的時代，是人類在科學上有能力評估自身起源的時代。揭示正在進行。"
landingS6Eyebrow = "方法"
landingS6Heading = "一份工作假設，而非教義。"
