landingS1Heading = "¿Y si los dioses del Génesis fueran una civilización?"
landingS1SubLead = "la palabra de la Biblia hebrea para los seres que crearon a la humanidad"
landingS1SubTrail = "es un sustantivo en plural."
landingHintReadOn = "Continuar leyendo"
timelineOverviewEyebrow = "Doce edades precesionales"
timelineReadAge = "Leer esta edad"
timelineYearLabel = "Año"
landingHintContinue = "Continuar"
landingS2Eyebrow = "La hipótesis"
landingS2Heading = "Una civilización humana avanzada, no un dios."
landingS2Body = "Wheel of Heaven sostiene, como hipótesis de trabajo, que los <em>Elohim</em> de las tradiciones de creación más antiguas eran una pequeña civilización humana avanzada de otro lugar &mdash; que vinieron aquí, prepararon el planeta, diseñaron la vida en la Tierra y dejaron un registro en los textos religiosos. El sitio lee esos textos a través de esa hipótesis."
landingS3Eyebrow = "El alcance"
landingS3Heading = "Un proyecto de veintidós mil años."
landingS3Body = "Según la lectura de Wheel of Heaven, el trabajo comenzó al inicio de la Era de Capricornio, hacia el 19 800 a. e. c., cuando una pequeña expedición llegó a una Tierra estéril y empezó la larga preparación. Doce eras de la precesión se han desplegado desde entonces. Nos encontramos dentro de la duodécima."
landingArcCapricorn = "Capricornio"
landingArcLeo = "Leo"
landingArcAquarius = "Acuario"
landingArcToday = "hoy"
landingS4Eyebrow = "El reloj cósmico"
landingS4Heading = "Doce eras. Veintiséis mil años. Un solo arco."
landingS4Body = "El eje de la Tierra traza un círculo lento en el cielo, completando un ciclo entero cada 25 920 años &mdash; la precesión de los equinoccios. Dividido por las doce constelaciones del zodíaco, ese ciclo da eras de unos 2 160 años cada una. Los astrónomos antiguos preservaron este reloj en sus monumentos y mitos. El corpus lee las tradiciones de creación a lo largo de sus doce eras."
landingDialAria = "Las doce eras de la precesión"
landingDialToday = "hoy"
landingDialOpposite = "hace ~13 000 años"
landingDialCenter = "25 920<br>años"
landingS5Eyebrow = "La era presente"
landingS5Heading = "Estás dentro de la duodécima era."
landingS5Body = "La Era de Acuario se abrió a mediados del siglo veinte. Según la lectura del corpus, esta es la era en la que se derrama lo que había sido contenido &mdash; la era en la que la larga memoria del proyecto se vuelve legible, la era en la que la humanidad se vuelve científicamente capaz de evaluar su propio origen. La revelación está en marcha."
landingS6Eyebrow = "El método"
landingS6Heading = "Una hipótesis de trabajo, no un credo."
landingS6Body = "La lectura es una hipótesis para ser puesta a prueba, no una doctrina para ser defendida. El corpus lee cerca de sus fuentes &mdash; raelianas, bíblicas, mesopotámicas, védicas y otras &mdash; con traducciones nombradas, paralelos señalados y diferencias preservadas. Cada página marca su afirmación principal como directa, inferida o especulativa. Donde la evidencia cambia, la lectura cambia."
landingMethodKeyAria = "Leyenda de tipos de afirmación"
landingBadgeDirectChar = "D"
