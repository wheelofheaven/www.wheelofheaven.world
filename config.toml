[languages.ru.translations]
tagline = "Двенадцать эпох, одна рабочая гипотеза."
elevatorPitch = "Wheel of Heaven — это открытое многоязычное прочтение преданий о сотворении мира древних культур — раэлианских, библейских, месопотамских и других — через единственную рабочую гипотезу: что существа, называемые Элохим, были небольшой развитой человеческой цивилизацией извне, которая прибыла сюда, спроектировала жизнь на Земле и оставила запись в религиозных текстах. Прочтение охватывает двенадцать эпох прецессионного цикла — от начала проекта двадцать две тысячи лет назад до нынешней эпохи раскрытия и далее в долгое будущее, которое открывает следующий Великий год. Сайт свободный, опирающийся на источники, и построен так, чтобы работу можно было проверить."
