landingS4Body = "Земная ось медленно описывает круг в небе, совершая полный цикл каждые 25 920 лет &mdash; прецессия равноденствий. Разделённый на двенадцать созвездий зодиака, этот цикл даёт эпохи длиной около 2 160 лет каждая. Древние астрономы сохранили эти часы в своих монументах и мифах. Корпус читает предания о сотворении на протяжении его двенадцати эпох."
