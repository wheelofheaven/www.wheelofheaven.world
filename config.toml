[languages.es.translations]
tagline = "Doce eras, una hipótesis de trabajo."
elevatorPitch = "Wheel of Heaven es una lectura abierta y multilingüe de las tradiciones de creación del mundo antiguo — raelianas, bíblicas, mesopotámicas y otras — a través de una única hipótesis de trabajo: que los seres llamados Elohim eran una pequeña civilización humana avanzada de otro lugar, que vino aquí, diseñó la vida en la Tierra y dejó un registro en los textos religiosos. La lectura recorre doce eras del ciclo de la precesión, desde el comienzo del proyecto hace veintidós mil años hasta la era actual de la revelación y hacia el largo futuro que abre el próximo Gran Año. El sitio es libre, consciente de sus fuentes, y construido para que el trabajo pueda ser verificado."
