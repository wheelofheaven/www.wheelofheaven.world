landingS1Heading = "Et si les dieux de la Genèse étaient une civilisation ?"
landingS1SubLead = "le mot de la Bible hébraïque pour les figures qui créèrent l'humanité"
landingS1SubTrail = "est un nom au pluriel."
landingHintReadOn = "Lire la suite"
landingHintContinue = "Continuer"
landingS2Eyebrow = "L'hypothèse"
landingS2Heading = "Une civilisation humaine avancée, et non un dieu."
landingS2Body = "Wheel of Heaven soutient, à titre d'hypothèse de travail, que les <em>Élohim</em> des plus anciennes traditions de création étaient une petite civilisation humaine avancée venue d'ailleurs &mdash; qu'ils sont arrivés ici, ont préparé la planète, ont conçu la vie sur Terre et ont laissé un récit dans les textes religieux. Le site lit ces textes à travers cette hypothèse."
landingS3Eyebrow = "La portée"
landingS3Heading = "Un projet vieux de vingt-deux mille ans."
landingS3Body = "Selon la lecture de Wheel of Heaven, le travail commença au début de l'âge du Capricorne, vers 19 800 av. n. è., lorsqu'une petite expédition arriva sur une Terre stérile et entama la longue préparation. Douze âges précessionnels se sont déployés depuis. Nous sommes à l'intérieur du douzième."
landingArcCapricorn = "Capricorne"
landingArcLeo = "Lion"
landingArcAquarius = "Verseau"
landingArcToday = "aujourd'hui"
landingS4Eyebrow = "L'horloge cosmique"
landingS4Heading = "Douze âges. Vingt-six mille ans. Un seul arc."
landingS4Body = "L'axe terrestre trace un cercle lent dans le ciel et achève un cycle complet tous les 25 920 ans &mdash; la précession des équinoxes. Divisé par les douze constellations du zodiaque, ce cycle donne des âges d'environ 2 160 ans chacun. Les astronomes anciens ont conservé cette horloge dans leurs monuments et leurs mythes. Le corpus lit les traditions de création à travers ses douze âges."
landingDialAria = "Les douze âges précessionnels"
landingDialToday = "aujourd'hui"
landingDialOpposite = "il y a ~13 000 ans"
landingDialCenter = "25 920<br>ans"
landingS5Eyebrow = "L'âge présent"
landingS5Heading = "Vous êtes à l'intérieur du douzième âge."
landingS5Body = "L'âge du Verseau s'est ouvert au milieu du vingtième siècle. Selon la lecture du corpus, c'est l'âge où ce qui était contenu est répandu &mdash; l'âge où la longue mémoire du projet devient lisible, l'âge où l'humanité devient scientifiquement capable d'évaluer sa propre origine. La révélation est en cours."
landingS6Eyebrow = "La méthode"
landingS6Heading = "Une hypothèse de travail, et non un credo."
landingS6Body = "La lecture est une hypothèse à éprouver, non une doctrine à défendre. Le corpus lit au plus près de ses sources &mdash; raëliennes, bibliques, mésopotamiennes, védiques et autres &mdash; avec les traductions nommées, les parallèles signalés et les différences préservées. Chaque page marque son affirmation principale comme directe, déduite ou spéculative. Là où les preuves changent, la lecture change."
