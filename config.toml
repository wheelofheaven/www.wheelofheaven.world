base_url = "https://www.wheelofheaven.world"
default_language = "en"
theme = "bifrost"
title = "Wheel of Heaven"
description = "A long reading of the ancient world's creation traditions through a single working hypothesis: that the beings called Elohim were a small advanced civilization that designed life on Earth. Organized along the precessional cycle, in twelve ages."
compile_sass = true
build_search_index = true
generate_feeds = true

taxonomies = [
    { name = "tags", feed = true },
    { name = "topics", feed = false },
    { name = "authors", feed = false },
]
feed_filenames = ["atom.xml", "rss.xml"]
feed_limit = 20

[markdown]

[search]
index_format = "fuse_json"
# Cap the per-record body to 2000 chars. Without this, Zola dumps the
# entire rendered page into each record, ballooning search_index.en.json
# to ~64 MB — which destroys mobile Lighthouse when Fuse loads it. At
# 2000 chars (~400 words) we keep title + first 2–3 paragraphs, which
# covers ~95% of entity / concept queries. Long phrase matches deep
# inside articles degrade; the alternative was an unusable index.
truncate_content_length = 2000

