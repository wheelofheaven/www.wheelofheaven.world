elevatorPitch = "Wheel of Heaven 是一份开放、多语言的古代创世传统阅读——雷利安派、圣经、美索不达米亚等等——通过一个单一的工作假设：被称为 Elohim 的存在是一支来自他处的小型先进人类文明，他们来到这里，设计了地球上的生命，并在宗教文本中留下了记录。该阅读跨越岁差周期的十二个时代，从两万两千年前项目的开端，到当下的揭示时代，再到下一个大年所开启的漫长未来。本网站开源、注重出处，并以便于复核的方式构建。"
