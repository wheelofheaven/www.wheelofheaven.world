landingS3Body = "依照 Wheel of Heaven 的閱讀，這項工作始於摩羯座時代之初，約公元前 19,800 年 &mdash; 一支小型探索隊抵達一片荒蕪的地球，開始了漫長的準備。此後已展開了十二個歲差時代。我們正身處第十二個之中。"
