tagline = "十二の時代、ひとつの作業仮説。"
elevatorPitch = "Wheel of Heaven は、古代世界の創造伝承——ラエル派、聖書、メソポタミア、その他——を、ただひとつの作業仮説を通して読む、開かれた多言語の読解です。すなわち、エロヒムと呼ばれる存在は、よそから来た小さな先進的な人間の文明であり、ここに到来し、地球上の生命を設計し、宗教的諸文献にその記録を残した、という仮説です。この読解は歳差周期の十二の時代にわたって広がります。二万二千年前のプロジェクトの始まりから、現在の開示の時代を経て、次の大いなる年が開く長い未来へと続きます。本サイトはオープンで、典拠を明示し、作業を検証できるよう構築されています。"
