landingS1Heading = "如果《創世記》中的諸神是一支文明呢？"
landingS1SubLead = "希伯來聖經中指代創造人類者的詞"
landingS1SubTrail = "是一個複數名詞。"
landingHintReadOn = "繼續閱讀"
landingHintContinue = "繼續"
landingS2Eyebrow = "假設"
landingS2Heading = "並非神，而是一支先進的人類文明。"
landingS2Body = "Wheel of Heaven 持有以下工作假設：在更古老的創世傳統中，<em>Elohim</em> 是一支來自他處的小型先進人類文明 &mdash; 他們來到這裡，整備了這顆行星，設計了地球上的生命，並在宗教文獻中留下了記錄。本站透過這一假設閱讀這些文獻。"
landingS3Eyebrow = "範圍"
landingS3Heading = "一項歷經兩萬兩千年的工程。"
landingS3Body = "依照 Wheel of Heaven 的閱讀，這項工作始於摩羯座時代之初，約公元前 19,800 年 &mdash; 一支小型探索隊抵達一片荒蕪的地球，開始了漫長的準備。此後已展開了十二個歲差時代。我們正身處第十二個之中。"
landingArcCapricorn = "摩羯座"
landingArcLeo = "獅子座"
landingArcAquarius = "水瓶座"
landingArcToday = "今日"
landingS4Eyebrow = "宇宙之鐘"
landingS4Heading = "十二個時代。兩萬六千年。一個弧。"
landingS4Body = "地球的自轉軸在天空中緩慢畫出一個圓，每 25,920 年完成一次完整循環 &mdash; 這便是分點歲差。以黃道十二星座加以劃分，這一週期產生約每 2,160 年一個的時代。古代天文學家將這座時鐘保留在他們的紀念碑與神話之中。本語料庫以其十二個時代為背景閱讀各創世傳統。"
landingDialAria = "十二個歲差時代"
