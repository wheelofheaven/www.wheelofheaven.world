landingBadgeSpeculativeNote = "synthèse interprétative ou hypothèse"
landingS7Eyebrow = "Voies de lecture"
landingS7Heading = "Trois entrées."
landingPathTimelineTitle = "La Chronologie"
landingPathTimelineDesc = "Vingt-six mille ans parcourus à travers douze âges, de la première arrivée au Capricorne au Verseau d'aujourd'hui."
landingPathTimelineCta = "Parcourir les âges"
landingPathLibraryTitle = "La Bibliothèque"
landingPathLibraryDesc = "Les textes primaires que le corpus lit, avec commentaire et contexte."
landingPathLibraryCta = "Ouvrir la bibliothèque"
landingPathWikiTitle = "Le Wiki"
landingPathWikiDesc = "Entrées de référence sur les Élohim, la précession, les figures des traditions de création et la terminologie propre au projet."
landingPathWikiCta = "Parcourir les entrées"
landingHintCoda = "Ou conclure avec les mots mêmes du projet"
landingCodaQuote = "L'âge tient son nom de sa constellation : le Verseau, le Porteur d'eau. Le corpus le lit à son sens le plus littéral : l'âge du Verseau est l'âge où ce qui était contenu est répandu."
