landingArcLeo = "Leo"
landingArcAquarius = "Acuario"
landingArcToday = "hoy"
landingS4Eyebrow = "El reloj cósmico"
landingS4Heading = "Doce eras. Veintiséis mil años. Un solo arco."
landingS4Body = "El eje de la Tierra traza un círculo lento en el cielo, completando un ciclo entero cada 25 920 años &mdash; la precesión de los equinoccios. Dividido por las doce constelaciones del zodíaco, ese ciclo da eras de unos 2 160 años cada una. Los astrónomos antiguos preservaron este reloj en sus monumentos y mitos. El corpus lee las tradiciones de creación a lo largo de sus doce eras."
landingDialAria = "Las doce eras de la precesión"
