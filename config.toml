elevatorPitch = "גלגל השמיים הוא קריאה פתוחה ורב‑לשונית של מסורות הבריאה של העולם העתיק — הראליאנית, המקראית, המסופוטמית ואחרות — דרך השערת עבודה אחת: שהיצורים הנקראים אלוהים היו ציוויליזציה אנושית מתקדמת וקטנה ממקום אחר, שהגיעה לכאן, עיצבה את החיים על פני כדור הארץ והותירה אחריה תיעוד בכתבי הקודש. הקריאה משתרעת על פני שנים‑עשר עידנים של מחזור הנקיפה, מראשית הפרויקט לפני עשרים ושניים אלף שנה ועד עידן ההתגלות הנוכחי, ואל תוך העתיד הארוך שהשנה הגדולה הבאה פותחת. האתר חופשי, מודע למקורותיו ובנוי כך שהעבודה ניתנת לבדיקה."
