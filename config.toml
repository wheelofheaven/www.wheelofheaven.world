tagline = "Twelve ages, one working hypothesis."
elevatorPitch = "Wheel of Heaven is an open, multilingual reading of the ancient world's creation traditions — Raëlian, biblical, Mesopotamian, and others — through a single working hypothesis: that the beings called Elohim were a small advanced human civilization that came here, designed life on Earth, and left a record in the religious texts. The reading runs across twelve ages of the precessional cycle, from the project's beginning twenty-two thousand years ago to the present age of disclosure and into the long future the next Great Year is opening. The site is free, source-aware, and built so the work can be checked."
