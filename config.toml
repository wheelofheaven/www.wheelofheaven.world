landingArcAquarius = "水瓶座"
landingArcToday = "今天"
landingS4Eyebrow = "宇宙之钟"
landingS4Heading = "十二个时代。两万六千年。一个弧。"
landingS4Body = "地球的自转轴在天空中缓慢画出一个圆，每 25,920 年完成一次完整循环 &mdash; 这便是分点岁差。以黄道十二星座加以划分，这一周期产生约每 2,160 年一个的时代。古代天文学家将这座时钟保留在他们的纪念碑与神话之中。本语料库以其十二个时代为背景阅读各创世传统。"
