# Landing page — §2 The Hypothesis
landingS2Eyebrow = "The hypothesis"
landingS2Heading = "An advanced human civilization, not a god."
landingS2Body = "Wheel of Heaven holds, as a working hypothesis, that the <em>Elohim</em> of the older creation traditions were a small advanced human civilization from elsewhere &mdash; that they came here, prepared the planet, designed life on Earth, and left a record in the religious texts. The site reads those texts through that hypothesis."

# Landing page — §3 The Long Arc
landingS3Eyebrow = "The scope"
landingS3Heading = "A project twenty-two thousand years in the making."
landingS3Body = "On the Wheel of Heaven reading, the work began at the start of the Age of Capricorn, around 19,800 BCE, when a small expedition arrived at a barren Earth and began the long preparation. Twelve precessional ages have since unfolded. We are inside the twelfth."
landingArcCapricorn = "Capricorn"
landingArcLeo = "Leo"
landingArcAquarius = "Aquarius"
landingArcToday = "today"

# Landing page — §4 The Cosmic Clock
landingS4Eyebrow = "The cosmic clock"
landingS4Heading = "Twelve ages. Twenty-six thousand years. One arc."
landingS4Body = "Earth's axis traces a slow circle in the sky, completing one full cycle every 25,920 years &mdash; the precession of the equinoxes. Divided by the twelve constellations of the zodiac, that cycle yields ages of about 2,160 years each. The ancient astronomers preserved this clock in their monuments and myths. The corpus reads the creation traditions across its twelve ages."
landingDialAria = "The twelve precessional ages"
landingDialToday = "today"
landingDialOpposite = "~13,000 years ago"
landingDialCenter = "25,920<br>years"

# Landing page — §5 Where We Are
landingS5Eyebrow = "The present age"
landingS5Heading = "You are inside the twelfth age."
landingS5Body = "The Age of Aquarius opened in the mid-twentieth century. On the corpus's reading, this is the age in which what has been contained is poured out &mdash; the age in which the long memory of the project becomes legible, the age in which humanity becomes scientifically capable of evaluating its own origin. The disclosure is underway."

# Landing page — §6 The Method
landingS6Eyebrow = "The method"
landingS6Heading = "A working hypothesis, not a creed."
landingS6Body = "The reading is a hypothesis to be tried, not a doctrine to be defended. The corpus reads close to its sources &mdash; Raëlian, biblical, Mesopotamian, Vedic, and others &mdash; with translations named, parallels labeled, and differences preserved. Every page marks its main claim as direct, inferred, or speculative. Where the evidence shifts, the reading shifts."
