                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"></path>
                            <path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"></path>
                            <path d="M12 7v14"></path>
                        </svg>
                        <span data-i18n="startReading">Start Reading</span>
                    </a>
                </div>
                <p style="margin-top: 2rem; font-size: 0.9rem; color: var(--color-text-muted);">
                    <span data-i18n="reorganized">If you followed a link from another site, the content may have been reorganized.</span>
                    <br><span data-i18n="tryLinks">Try one of the links above to find what you&#x27;re looking for.</span>
                </p>
            </div>
        </main>

        <script>
        (function () {
            // All locale strings rendered server-side so JS can pick by URL.
            
            const I18N = {
                
                "en": {
                    title: "Page Not Found",
                    heading: "Page Not Found",
                    body: "The page you're looking for doesn't exist or has been moved to a new location.",
                    goHome: "Go Home",
                    browseWiki: "Browse Wiki",
                    startReading: "Start Reading",
                    reorganized: "If you followed a link from another site, the content may have been reorganized.",
                    tryLinks: "Try one of the links above to find what you're looking for."
                },
                
                "de": {
                    title: "Seite nicht gefunden",
                    heading: "Seite nicht gefunden",
                    body: "Die gesuchte Seite existiert nicht oder wurde an einen neuen Ort verschoben.",
                    goHome: "Zur Startseite",
                    browseWiki: "Wiki durchsuchen",
                    startReading: "Lesen beginnen",
                    reorganized: "Wenn Sie einem Link von einer anderen Website gefolgt sind, wurde der Inhalt möglicherweise neu organisiert.",
                    tryLinks: "Versuchen Sie einen der Links oben, um das Gesuchte zu finden."
                },
                
                "fr": {
                    title: "Page introuvable",
                    heading: "Page introuvable",
                    body: "La page que vous recherchez n'existe pas ou a été déplacée vers un nouvel emplacement.",
                    goHome: "Accueil",
                    browseWiki: "Parcourir le Wiki",
                    startReading: "Commencer à lire",
                    reorganized: "Si vous avez suivi un lien depuis un autre site, le contenu a peut-être été réorganisé.",
                    tryLinks: "Essayez l'un des liens ci-dessus pour trouver ce que vous cherchez."
                },
                
                "es": {
                    title: "Página no encontrada",
                    heading: "Página no encontrada",
                    body: "La página que busca no existe o se ha movido a una nueva ubicación.",
                    goHome: "Ir al inicio",
                    browseWiki: "Explorar el Wiki",
                    startReading: "Empezar a leer",
                    reorganized: "Si siguió un enlace desde otro sitio, el contenido puede haberse reorganizado.",
                    tryLinks: "Pruebe uno de los enlaces de arriba para encontrar lo que busca."
                },
                
                "ru": {
                    title: "Страница не найдена",
                    heading: "Страница не найдена",
                    body: "Запрашиваемая страница не существует или была перемещена в другое место.",
                    goHome: "На главную",
                    browseWiki: "Просмотр Wiki",
                    startReading: "Начать чтение",
                    reorganized: "Если вы перешли по ссылке с другого сайта, контент мог быть реорганизован.",
                    tryLinks: "Попробуйте одну из ссылок выше, чтобы найти нужное."
                },
                
                "ja": {
                    title: "ページが見つかりません",
                    heading: "ページが見つかりません",
                    body: "お探しのページは存在しないか、新しい場所に移動されました。",
                    goHome: "ホームへ",
                    browseWiki: "Wikiを見る",
                    startReading: "読み始める",
                    reorganized: "他のサイトからリンクをたどった場合、コンテンツが再編成された可能性があります。",
                    tryLinks: "上のリンクからお探しのものを見つけてください。"
                },
                
                "zh": {
                    title: "页面未找到",
                    heading: "页面未找到",
                    body: "您查找的页面不存在或已移至新位置。",
                    goHome: "返回首页",
                    browseWiki: "浏览维基",
                    startReading: "开始阅读",
                    reorganized: "如果您从其他网站点击链接进入，内容可能已被重新组织。",
                    tryLinks: "请尝试上方的链接以查找您需要的内容。"
                },
                
                "zh-Hant": {
                    title: "頁面未找到",
                    heading: "頁面未找到",
                    body: "您尋找的頁面不存在或已移至新位置。",
                    goHome: "返回首頁",
                    browseWiki: "瀏覽維基",
                    startReading: "開始閱讀",
                    reorganized: "如果您從其他網站點擊連結進入，內容可能已被重新組織。",
                    tryLinks: "請嘗試上方的連結以尋找您需要的內容。"
                },
                
                "ko": {
                    title: "페이지를 찾을 수 없습니다",
                    heading: "페이지를 찾을 수 없습니다",
                    body: "찾으시는 페이지가 존재하지 않거나 새 위치로 이동되었습니다.",
                    goHome: "홈으로",
                    browseWiki: "위키 둘러보기",
                    startReading: "읽기 시작",
                    reorganized: "다른 사이트에서 링크를 따라오신 경우 내용이 재구성되었을 수 있습니다.",
                    tryLinks: "위 링크 중 하나를 시도해 원하시는 내용을 찾아보세요."
                },
                
                "he": {
                    title: "הדף לא נמצא",
                    heading: "הדף לא נמצא",
                    body: "הדף שחיפשתם אינו קיים או הועבר למיקום חדש.",
                    goHome: "חזרה לדף הבית",
                    browseWiki: "עיינו בוויקי",
                    startReading: "התחילו לקרוא",
                    reorganized: "אם הגעתם דרך קישור מאתר אחר, ייתכן שהתוכן אורגן מחדש.",
                    tryLinks: "נסו אחד הקישורים למעלה כדי למצוא את שחיפשתם."
                }
                
            };

            // Detect lang from URL path. zh-Hant has a hyphen so check it first.
            const SUPPORTED = ["zh-Hant", "de", "es", "fr", "ja", "ko", "ru", "zh"];
            const path = window.location.pathname || "/";
            let lang = "en";
            for (const candidate of SUPPORTED) {
                if (path === "/" + candidate || path.startsWith("/" + candidate + "/")) {
                    lang = candidate;
                    break;
                }
            }

            const t = I18N[lang] || I18N.en;

            // Swap lang attribute and text nodes.
            document.documentElement.lang = lang;
            document.title = t.title + " | Wheel of Heaven";
            document.querySelectorAll("[data-i18n]").forEach((el) => {
                const key = el.dataset.i18n;
                if (t[key]) el.textContent = t[key];
            });

            // Re-point the action links to lang-prefixed paths.
            const linkPath = lang === "en" ? "" : "/" + lang;
            document.querySelectorAll("[data-i18n-link]").forEach((el) => {
                const target = el.dataset.i18nLink;
                if (target === "home") el.href = linkPath + "/";
                else if (target === "wiki") el.href = linkPath + "/wiki/";
                else if (target === "read") el.href = linkPath + "/read/";
            });

            // Update <main> aria-label to match the heading.
            const main = document.getElementById("main-content");
            if (main) main.setAttribute("aria-label", t.heading);

            // Update <meta name="description"> too, in case bots can see it.
            const metaDesc = document.querySelector('meta[name="description"]');
            if (metaDesc) metaDesc.setAttribute("content", t.body);
        })();
        </script>
    </body>
